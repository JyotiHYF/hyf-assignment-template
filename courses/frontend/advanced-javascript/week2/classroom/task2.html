<!doctype html>
<html>
  <head>
    <title>Task2</title>
  </head>
  <body>
    <h1>Delayed Button Click</h1>
    <button id="delayedBtn">Log in 3 seconds</button>
    <p id="output"></p>
    <script>
      const button = document.getElementById("delayedBtn");
      const output = document.getElementById("output");
      button.addEventListener("click", () => {
        setTimeout(() => {
          output.textContent = "Button clicked after 3 seconds!";
        }, 3000);
      });
    </script>
  </body>
</html>
