<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Fastest Presser</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <h1>Fastest Presser</h1>
      <div class="controls">
        <label for="timeInput"><strong>Enter Time (seconds):</strong></label>
        <input id="timeInput" type="number" placeholder="Seconds" />
        <button id="startBtn">Start</button>
      </div>
      <h2 id="message"></h2>
      <h3 id="countdown"></h3>
    </div>

    <div class="game-container">
      <div class="player s-player">
        <div class="label">Press S</div>
        <div id="sCount" class="counter-box">0</div>
      </div>
      <div class="player l-player">
        <div class="label">Press L</div>
        <div id="lCount" class="counter-box">0</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
