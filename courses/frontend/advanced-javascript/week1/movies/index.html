<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>🎬 Movie Explorer Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>🎬 Movie Explorer</h1>

    <div class="buttons">
      <button id="shortBtn">Short Titles</button>
      <button id="longBtn">Long Titles</button>
      <button id="eightiesBtn">80's Movies Count</button>
      <button id="tagBtn">Tagged Movies</button>
      <button id="ratingsBtn">Ratings > 6</button>
      <button id="keywordBtn">Keyword Count</button>
      <button id="dupWordBtn">Duplicated Titles</button>
      <button id="avgRatingBtn">Average Rating</button>
      <button id="ratingCountBtn">Rating Counts</button>
    </div>

    <div id="results" class="results"></div>

    <script src="script.js"></script>
  </body>
</html>
